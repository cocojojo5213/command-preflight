name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: command-preflight-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go test ./...
      - run: go vet ./...
      - if: runner.os != 'Windows'
        run: sh scripts/check-skill-sync.sh
