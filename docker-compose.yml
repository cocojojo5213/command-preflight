services:
  command-preflight-server:
    build: .
    restart: unless-stopped
    command:
      - --listen
      - ${COMMAND_PREFLIGHT_BIND:-0.0.0.0:8787}
      - --data
      - ${COMMAND_PREFLIGHT_DATA:-/data/knowledge.json}
    environment:
      COMMAND_PREFLIGHT_ALLOW_REPORT: ${COMMAND_PREFLIGHT_ALLOW_REPORT:-false}
      COMMAND_PREFLIGHT_REPORT_TOKEN: ${COMMAND_PREFLIGHT_REPORT_TOKEN:-}
      COMMAND_PREFLIGHT_ADMIN_TOKEN: ${COMMAND_PREFLIGHT_ADMIN_TOKEN:-}
      COMMAND_PREFLIGHT_REPORT_SUBMIT_TOKEN: ${COMMAND_PREFLIGHT_REPORT_SUBMIT_TOKEN:-}
      COMMAND_PREFLIGHT_ALLOW_PROXIED_ADMIN: ${COMMAND_PREFLIGHT_ALLOW_PROXIED_ADMIN:-false}
      COMMAND_PREFLIGHT_REPORTS_PER_MINUTE: ${COMMAND_PREFLIGHT_REPORTS_PER_MINUTE:-60}
      COMMAND_PREFLIGHT_REPORT_RETENTION_DAYS: ${COMMAND_PREFLIGHT_REPORT_RETENTION_DAYS:-30}
    ports:
      - "${COMMAND_PREFLIGHT_PUBLISHED_BIND:-127.0.0.1:8787}:8787"
    volumes:
      - ${COMMAND_PREFLIGHT_DATA_VOLUME:-command-preflight-data}:/data
    read_only: true
    tmpfs:
      - /tmp

volumes:
  command-preflight-data:
